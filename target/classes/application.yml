server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: traffic-backend

  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:traffic_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # JSON序列化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 开启SQL日志打印
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# 微信小程序配置
wx:
  app-id: ${WX_APP_ID:your_app_id}
  app-secret: ${WX_APP_SECRET:your_app_secret}
  jscode2session-url: https://api.weixin.qq.com/sns/jscode2session

# JWT配置
jwt:
  # 密钥（生产环境请替换为强随机字符串，至少256位）
  secret: ${JWT_SECRET:traffic-backend-secret-key-please-change-in-production-2026}
  # 过期时间：7天（毫秒）
  expiration: 604800000

# 日志配置
logging:
  level:
    com.traffic: DEBUG
    org.springframework.security: INFO
